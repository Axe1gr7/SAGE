<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Portal Estudiantes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="miSidebar" class="sidebar">
        <a href="{{ url_for('dashboard') }}" class="sidebar-item">🏠 INICIO</a>
        <hr style="border: 1px solid rgba(123, 162, 248, 0.3); margin: 15px 20px;">
        
        <a href="{{ url_for('dashboard') }}" class="sidebar-item">📅 AGENDAR ESPACIO</a>
        <a href="{{ url_for('mis_reservas') }}" class="sidebar-item">🕒 MIS RESERVAS</a>
        <a href="{{ url_for('eventos') }}" class="sidebar-item">🎟️ EVENTOS</a>
        <a href="{{ url_for('sitios') }}" class="sidebar-item">📍 SITIOS E INFO</a>
        
        <hr style="border: 1px solid rgba(123, 162, 248, 0.3); margin: 15px 20px;">
        <a href="#" class="sidebar-item" onclick="abrirPerfil()" style="color: #4ade80;">👤 MI PERFIL</a>
        
        <a href="{{ url_for('login') }}" class="sidebar-item" style="margin-top: 50px; color: #f87171; text-shadow: 0 0 8px #f87171;">🚪 CERRAR SESIÓN</a>
    </div>

    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(3, 6, 13, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--neon-blue); box-shadow: 0 2px 15px rgba(123, 162, 248, 0.2); width: 100%; box-sizing: border-box;">
        <div onclick="toggleSidebar()" style="cursor: pointer; display: flex; align-items: center; gap: 15px;">
            <span style="color: var(--neon-blue); font-size: 1.5rem; text-shadow: 0 0 10px var(--neon-blue);">☰</span>
            <strong style="color: #4ade80; font-family: 'Orbitron', sans-serif; font-size: 1.6rem; letter-spacing: 3px; text-shadow: 0 0 10px rgba(74, 222, 128, 0.6);">SAGE</strong>
        </div>
        
        <div style="display: flex; align-items: center; gap: 25px;">
            <span style="font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--neon-blue);">PORTAL ALUMNO</span>
            <div style="width: 35px; height: 35px; border-radius: 50%; background-color: var(--bg-dark); border: 2px solid var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); display: flex; justify-content: center; align-items: center; cursor: pointer;" onclick="abrirPerfil()">
                <span style="font-size: 1rem;">🎓</span>
            </div>
        </div>
    </nav>

    <main style="padding: 40px 20px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box;">
        {% block content %}{% endblock %}
    </main>

    <div id="modalPerfil" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: var(--neon-blue); margin-top:0; text-align: center; font-family: 'Orbitron', sans-serif;">Mi Perfil</h2>
            <form action="{{ url_for('dashboard') }}">
                <label style="color: #94a3b8; font-size: 0.85rem;">Matrícula:</label>
                <input type="text" class="neon-input" value="1220432" readonly style="background: rgba(11, 16, 26, 0.9); color: #94a3b8; cursor: not-allowed;">
                
                <label style="color: #94a3b8; font-size: 0.85rem;">Nombre Completo:</label>
                <input type="text" class="neon-input" value="Estudiante SAGE" readonly style="background: rgba(11, 16, 26, 0.9); color: #94a3b8; cursor: not-allowed;">

                <label style="color: #94a3b8; font-size: 0.85rem;">Correo Electrónico:</label>
                <input type="email" class="neon-input" value="alumno@universidad.edu.mx">

                <label style="color: #94a3b8; font-size: 0.85rem;">Nueva Contraseña:</label>
                <input type="password" class="neon-input" placeholder="Dejar en blanco para no cambiar">

                <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                    <button type="button" class="btn-outline" style="border-color: #f87171; color: #f87171;" onclick="cerrarPerfil()">Cancelar</button>
                    <button type="button" class="btn-action-green" onclick="cerrarPerfil()">Actualizar Perfil</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('miSidebar').classList.toggle('active');
        }
        function abrirPerfil() {
            document.getElementById('modalPerfil').style.display = 'flex';
        }
        function cerrarPerfil() {
            document.getElementById('modalPerfil').style.display = 'none';
        }
    </script>
</body>
</html>
