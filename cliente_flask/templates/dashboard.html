{% extends 'base.html' %}

{% block content %}
    <h1 class="title-outline" style="font-size: 2rem; margin-bottom: 40px; color: #7ba2f8; font-family: 'Orbitron', sans-serif; text-align: center; text-shadow: 0 0 10px rgba(123, 162, 248, 0.5);">
        PORTAL ESTUDIANTIL
    </h1>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; max-width: 900px; margin: 0 auto;">
        
        <a href="{{ url_for('agendar') }}" class="neon-box" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 160px; text-decoration: none; color: white; background: rgba(17, 24, 39, 0.8); border: 1px solid #7ba2f8; border-radius: 15px; transition: 0.3s; box-shadow: 0 0 10px rgba(123, 162, 248, 0.2);">
            <span style="font-size: 2.5rem; margin-bottom: 10px;">📅</span>
            <span style="font-size: 1.1rem; font-weight: 600; text-transform: uppercase; font-family: 'Orbitron';">Agendar Espacio</span>
        </a>

        <a href="{{ url_for('mis_reservas') }}" class="neon-box" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 160px; text-decoration: none; color: white; background: rgba(17, 24, 39, 0.8); border: 1px solid #7ba2f8; border-radius: 15px; transition: 0.3s; box-shadow: 0 0 10px rgba(123, 162, 248, 0.2);">
            <span style="font-size: 2.5rem; margin-bottom: 10px;">🕒</span>
            <span style="font-size: 1.1rem; font-weight: 600; text-transform: uppercase; font-family: 'Orbitron';">Mis Reservas</span>
        </a>

        <a href="{{ url_for('eventos') }}" class="neon-box" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 160px; text-decoration: none; color: white; background: rgba(17, 24, 39, 0.8); border: 1px solid #7ba2f8; border-radius: 15px; transition: 0.3s; box-shadow: 0 0 10px rgba(123, 162, 248, 0.2);">
            <span style="font-size: 2.5rem; margin-bottom: 10px;">🎟️</span>
            <span style="font-size: 1.1rem; font-weight: 600; text-transform: uppercase; font-family: 'Orbitron';">Eventos Universitarios</span>
        </a>

        <a href="{{ url_for('sitios') }}" class="neon-box" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 160px; text-decoration: none; color: white; background: rgba(17, 24, 39, 0.8); border: 1px solid #7ba2f8; border-radius: 15px; transition: 0.3s; box-shadow: 0 0 10px rgba(123, 162, 248, 0.2);">
            <span style="font-size: 2.5rem; margin-bottom: 10px;">📍</span>
            <span style="font-size: 1.1rem; font-weight: 600; text-transform: uppercase; font-family: 'Orbitron';">Información de Sitios</span>
        </a>

    </div>

    <style>
        .neon-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(123, 162, 248, 0.5) !important;
            border-color: #4ade80 !important;
        }
    </style>
{% endblock %}
