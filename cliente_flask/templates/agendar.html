{% extends 'base.html' %}

{% block content %}
    <div style="padding: 20px;">
        <h1 class="title-outline">MAPA DE ESPACIOS</h1>
        
        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <select id="select-espacio" class="neon-input" style="width: 250px; font-weight: bold; margin: 0; background: #1f2937; color: white;" onchange="actualizarHorariosEspacio()">
                <option value="1" data-apertura="07:00" data-cierre="22:00">LABORATORIO A1 (07:00 - 22:00)</option>
                <option value="2" data-apertura="08:00" data-cierre="16:00">LABORATORIO A2 (08:00 - 16:00)</option>
            </select>
            <input type="date" class="neon-input" style="width: 200px; color-scheme: dark; margin: 0; background: #1f2937; color: white;">
        </div>

        <div style="display: flex; gap: 30px;">
            <div class="neon-box" style="flex-grow: 1; padding: 20px; background: rgba(17, 24, 39, 0.8); border: 1px solid #7ba2f8; border-radius: 15px;">
                <div style="background: rgba(123, 162, 248, 0.1); text-align: center; padding: 15px; margin-bottom: 20px; font-weight: 600; border: 1px dashed #7ba2f8; border-radius: 8px; color: #7ba2f8;">
                    PIZARRÓN / FRENTE
                </div>

                <div class="lab-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px;">
                    <div class="pc-node occupied" style="background: #f87171; padding: 15px; text-align: center; border-radius: 8px; color: white; cursor: not-allowed;">PC-01</div>
                    <div class="pc-node available" onclick="seleccionarAsiento(this, 'PC-02')" style="background: #4ade80; padding: 15px; text-align: center; border-radius: 8px; color: white; cursor: pointer;">PC-02</div>
                    <div class="pc-node available" onclick="seleccionarAsiento(this, 'PC-03')" style="background: #4ade80; padding: 15px; text-align: center; border-radius: 8px; color: white; cursor: pointer;">PC-03</div>
                    <div class="pc-node occupied" style="background: #f87171; padding: 15px; text-align: center; border-radius: 8px; color: white; cursor: not-allowed;">PC-04</div>
                    <div class="pc-node available" onclick="seleccionarAsiento(this, 'PC-05')" style="background: #4ade80; padding: 15px; text-align: center; border-radius: 8px; color: white; cursor: pointer;">PC-05</div>
                </div>
            </div>

            <div class="neon-box" style="width: 200px; padding: 20px; height: fit-content; background: rgba(17, 24, 39, 0.8); border: 1px solid #7ba2f8; border-radius: 15px;">
                <h3 style="margin-top: 0; color: white; font-family: 'Orbitron';">Estado</h3>
                <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: #94a3b8;">
                    <span style="color: #4ade80; font-size: 1.5rem;">■</span> Disponible
                </div>
                <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: #94a3b8;">
                    <span style="color: #f87171; font-size: 1.5rem;">■</span> Ocupado
                </div>
                <div style="display: flex; align-items: center; gap: 10px; color: #94a3b8;">
                    <span style="color: #7ba2f8; font-size: 1.5rem;">■</span> Seleccionado
                </div>
            </div>
        </div>
    </div>

    <div id="modalReserva" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
        <div class="modal-content" style="background: #111827; padding: 30px; border-radius: 15px; border: 2px solid #4ade80; width: 450px;">
            <h2 style="color: #4ade80; margin-top: 0; font-family: 'Orbitron';">Confirmar Reserva</h2>
            <p style="color: #94a3b8;">Equipo seleccionado: <strong id="equipoSelec" style="color: #7ba2f8; font-size: 1.2rem;"></strong></p>
            <p style="color: #4ade80; font-size: 0.85rem;" id="info-horario"></p>
            
            <form action="#" method="POST">
                <input type="hidden" name="id_espacio" id="id_espacio_input" value="1">
                
                <div style="display: flex; gap: 10px; margin-bottom: 25px; margin-top: 10px;">
                    <div style="flex: 1;">
                        <label style="color: #94a3b8; font-size: 0.9rem;">Hora Inicio:</label>
                        <input type="time" id="hora_inicio" name="hora_inicio" class="neon-input" required style="width: 100%; padding: 8px; background: #1f2937; border: 1px solid #374151; color: white;">
                    </div>
                    <div style="flex: 1;">
                        <label style="color: #94a3b8; font-size: 0.9rem;">Hora Fin:</label>
                        <input type="time" id="hora_fin" name="hora_fin" class="neon-input" required style="width: 100%; padding: 8px; background: #1f2937; border: 1px solid #374151; color: white;">
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                    <button type="button" class="btn-outline" onclick="cerrarReserva()" style="padding: 10px 20px; background: transparent; border: 1px solid #f87171; color: #f87171; border-radius: 5px; cursor: pointer;">Cancelar</button>
                    <button type="submit" class="btn-action-green" style="padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 5px; cursor: pointer;">Agendar Equipo</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let ultimoAsiento = null;

        function seleccionarAsiento(elemento, idEquipo) {
            if (elemento.classList.contains('occupied')) return;
            if (ultimoAsiento) {
                ultimoAsiento.style.background = '#4ade80';
            }
            
            elemento.style.background = '#7ba2f8'; // Color de seleccionado
            ultimoAsiento = elemento;
            
            document.getElementById('equipoSelec').innerText = idEquipo;
            document.getElementById('modalReserva').style.display = 'flex';
        }

        function cerrarReserva() {
            document.getElementById('modalReserva').style.display = 'none';
            if (ultimoAsiento) {
                ultimoAsiento.style.background = '#4ade80';
            }
            ultimoAsiento = null;
        }

        function actualizarHorariosEspacio() {
            const select = document.getElementById('select-espacio');
            const apertura = select.options[select.selectedIndex].getAttribute('data-apertura');
            const cierre = select.options[select.selectedIndex].getAttribute('data-cierre');
            const info = document.getElementById('info-horario');
            if (info) info.innerText = `Horarios disponibles: ${apertura} a ${cierre} hrs.`;
        }

        window.onload = actualizarHorariosEspacio;
    </script>
{% endblock %}
