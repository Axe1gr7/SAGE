{% extends "base.html" %}

{% block content %}
<div class="container">
    <header class="dashboard-header">
        <h1 class="neon-text">RESERVA DE LABORATORIOS</h1>
        <p class="text-muted">Selecciona un laboratorio, una fecha y haz clic en un equipo disponible.</p>
    </header>

    <div class="selector-container neon-box" style="margin-bottom: 30px; padding: 25px; display: flex; gap: 20px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 250px;">
            <label class="input-label">Laboratorio:</label>
            <select id="select-espacio" class="neon-input" style="width: 100%;" onchange="actualizarMapa()">
                {% for esp in espacios %}
                <option value="{{ esp.id_espacio }}" data-nombre="{{ esp.nombre }}">
                    {{ esp.nombre }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div style="flex: 1; min-width: 250px;">
            <label class="input-label">Fecha de Reserva:</label>
            <input type="date" id="fecha-selector" class="neon-input" style="width: 100%;" 
                   value="{{ fecha_hoy }}" onchange="actualizarMapa()">
        </div>
    </div>

    <div class="mapa-container neon-box" style="padding: 40px; min-height: 300px;">
        <div id="grid-equipos" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px;">
            <!-- Los equipos se cargarán dinámicamente con JavaScript -->
        </div>
    </div>
</div>

<div id="modalReserva" class="modal-overlay" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center;">
    <div class="neon-box modal-content" style="max-width: 400px; width: 90%; background: #0b1511; padding: 30px; border: 2px solid #3dba8a; border-radius: 15px;">
        <h2 style="color: #3dba8a; text-align: center; margin-bottom: 10px; font-family: 'Orbitron', sans-serif;">CONFIRMAR AGENDA</h2>
        <p style="text-align: center; color: #fff;">Estás reservando el: <strong id="txt-equipo-num" style="color: #3dba8a;">--</strong></p>

        <form action="{{ url_for('agendar_confirmar') }}" method="POST" id="form-final">
            <input type="hidden" name="id_espacio" id="hidden-espacio">
            <input type="hidden" name="id_equipo" id="hidden-equipo">
            <input type="hidden" name="fecha" id="hidden-fecha">

            <div style="margin: 20px 0;">
                <label class="input-label">Bloque horario disponible:</label>
                <select name="bloque_horario" id="select-bloque" class="neon-input" style="width: 100%;" required>
                    </select>
            </div>

            <p style="font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 20px;">
                *La reserva es válida por el bloque seleccionado.
            </p>

            <div style="display: flex; gap: 10px;">
                <button type="button" onclick="cerrarModal()" style="flex:1; padding: 10px; background: transparent; border: 1px solid #ff4444; color: #ff4444; border-radius: 5px; cursor: pointer;">Cancelar</button>
                <button type="submit" id="btn-submit" style="flex:1; padding: 10px; background: #3dba8a; border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer;">AGENDAR</button>
            </div>
        </form>
    </div>
</div>

<script>
// Datos de equipos pasados desde el servidor (lista de todos los equipos con su espacio_id)
const todosLosEquipos = {{ equipos | tojson }};

// 1. Dibuja los equipos del espacio seleccionado
function actualizarMapa() {
    const espacioId = parseInt(document.getElementById('select-espacio').value);
    const grid = document.getElementById('grid-equipos');
    
    // Filtramos los equipos por el ID del laboratorio actual (FastAPI devuelve 'id_espacio')
    const equiposFiltrados = todosLosEquipos.filter(eq => (eq.id_espacio || eq.espacio_id) === espacioId);
    
    if (equiposFiltrados.length === 0) {
        grid.innerHTML = '<p style="color: #888; text-align: center; grid-column: 1/-1;">No hay equipos registrados en este laboratorio.</p>';
        return;
    }

    grid.innerHTML = equiposFiltrados.map(eq => {
        const idEq = eq.id_equipo || eq.id;
        const nombre = eq.nombre_equipo || eq.nombre || `PC-${idEq}`;
        return `
            <div class="asiento-node" onclick="prepararReserva(${idEq}, '${nombre}')" 
                 style="padding: 20px; border: 1px solid #3dba8a; border-radius: 10px; cursor: pointer; text-align: center; transition: 0.3s; background: rgba(61,186,138,0.05);">
                <span style="font-size: 2rem;">💻</span><br>
                <small style="color: #fff; font-weight: bold;">${nombre}</small>
            </div>
        `;
    }).join('');
}

// 2. Carga los módulos y llena los campos ocultos antes de abrir el modal
async function prepararReserva(idEquipo, nombreEquipo) {
    const espacioId = document.getElementById('select-espacio').value;
    const fecha = document.getElementById('fecha-selector').value;
    const comboHoras = document.getElementById('select-bloque');

    if (!espacioId || !idEquipo || !fecha) {
        alert("Error: Faltan datos para procesar la reserva.");
        return;
    }

    document.getElementById('hidden-espacio').value = espacioId;
    document.getElementById('hidden-equipo').value = idEquipo;
    document.getElementById('hidden-fecha').value = fecha;
    document.getElementById('txt-equipo-num').innerText = nombreEquipo;

    comboHoras.innerHTML = '<option value="">Buscando disponibilidad...</option>';
    
    try {
        const resp = await fetch(`/api/equipos/${idEquipo}/modulos?fecha=${fecha}`);
        const data = await resp.json();

        if (!data.modulos || data.modulos.length === 0) {
            alert("No hay módulos disponibles para este equipo en la fecha seleccionada.");
            return;
        }

        comboHoras.innerHTML = data.modulos.map(m => {
            const hi = m.hora_inicio.substring(0, 5);
            const hf = m.hora_fin.substring(0, 5);
            return `<option value="${hi}-${hf}">${m.nombre || 'Bloque'} (${hi} - ${hf})</option>`;
        }).join('');

        document.getElementById('modalReserva').style.display = 'flex';
    } catch (e) {
        console.error("Error:", e);
        alert("No se pudieron cargar los horarios.");
    }
}

function cerrarModal() {
    document.getElementById('modalReserva').style.display = 'none';
}

// Inicialización
document.addEventListener('DOMContentLoaded', actualizarMapa);
</script>

<style>
    .asiento-node:hover {
        background: rgba(61, 186, 138, 0.2) !important;
        box-shadow: 0 0 15px rgba(61, 186, 138, 0.4);
        transform: translateY(-5px);
    }
    .neon-input {
        background: rgba(0,0,0,0.3);
        border: 1px solid #3dba8a;
        color: white;
        padding: 10px;
        border-radius: 5px;
    }
    .input-label {
        display: block;
        color: #3dba8a;
        margin-bottom: 8px;
        font-size: 0.8rem;
    }
    .modal-overlay {
        align-items: center;
        justify-content: center;
    }
</style>
{% endblock %}
