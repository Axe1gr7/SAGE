<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Registro Estudiantil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #0b101a; font-family: 'Segoe UI', sans-serif;">

    <div class="neon-box" style="width: 100%; max-width: 450px; padding: 40px 30px; box-sizing: border-box; text-align: center; background-color: rgba(17, 24, 39, 0.8); border: 1px solid #7ba2f8; border-radius: 15px; box-shadow: 0 0 20px rgba(123, 162, 248, 0.3);">
        
        <h2 style="color: #7ba2f8; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; margin-top: 0; margin-bottom: 5px; text-shadow: 0 0 10px rgba(123, 162, 248, 0.5);">SAGE</h2>
        <p style="color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem;">Crear Cuenta de Estudiante</p>
        
        <form action="{{ url_for('login') }}" method="GET">
            <input type="text" class="neon-input" placeholder="Nombre Completo" required 
                style="width: 100%; margin-bottom: 15px; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 5px; box-sizing: border-box;">
            
            <input type="text" class="neon-input" placeholder="Matrícula" required 
                style="width: 100%; margin-bottom: 15px; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 5px; box-sizing: border-box;">
            
            <input type="email" class="neon-input" placeholder="Correo Institucional" required 
                style="width: 100%; margin-bottom: 15px; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 5px; box-sizing: border-box;">
            
            <input type="password" class="neon-input" placeholder="Contraseña" required 
                style="width: 100%; margin-bottom: 15px; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 5px; box-sizing: border-box;">
            
            <input type="password" class="neon-input" placeholder="Confirmar Contraseña" required 
                style="width: 100%; margin-bottom: 25px; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 5px; box-sizing: border-box;">
            
            <button type="submit" class="btn-action-green" 
                style="width: 100%; padding: 12px; font-size: 1rem; letter-spacing: 1px; cursor: pointer; background: #10b981; color: white; border: none; border-radius: 5px; font-family: 'Orbitron'; transition: 0.3s;">
                REGISTRARSE
            </button>
        </form>

        <p style="margin-top: 25px; font-size: 0.9rem; color: #94a3b8;">
            ¿Ya tienes cuenta? <a href="{{ url_for('login') }}" style="color: #7ba2f8; text-decoration: none; font-weight: 600;">Inicia sesión aquí</a>
        </p>
    </div>

    <style>
        .neon-input:focus {
            outline: none;
            border-color: #4ade80 !important;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }
        .btn-action-green:hover {
            background: #059669 !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            transform: scale(1.02);
        }
    </style>

</body>
</html>
