<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Registro Estudiantil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="login-body">

    <div class="neon-box login-card">

        <h2 class="registro-titulo">SAGE</h2>
        <p class="login-subtitle">Crear Cuenta de Estudiante</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="background-color: {% if category == 'success' %}#1a2f24{% else %}#2f1a1a{% endif %}; border: 1px solid {% if category == 'success' %}#3dba8a{% else %}#ff4c4c{% endif %}; color: {% if category == 'success' %}#3dba8a{% else %}#ff4c4c{% endif %}; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 0.9em; font-family: 'Orbitron', sans-serif;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('registro') }}" method="POST">
            <input type="text"     name="nombre_completo" class="neon-input" placeholder="Nombre Completo"       required>
            <input type="text"     name="matricula"       class="neon-input" placeholder="Matrícula"              required>
            <input type="email"    name="correo"          class="neon-input" placeholder="Correo Institucional"   required>
            <input type="text"     name="carrera"         class="neon-input" placeholder="Carrera"                required>
            <input type="password" name="contrasena"      class="neon-input" placeholder="Contraseña"             required>
            <input type="password" name="confirmar"       class="neon-input" placeholder="Confirmar Contraseña"   required>
            <button type="submit" class="btn-action-green login-btn">REGISTRARSE</button>
        </form>

        <p class="login-footer">
            ¿Ya tienes cuenta? <a href="{{ url_for('login') }}" class="login-footer__link">Inicia sesión aquí</a>
        </p>
    </div>

</body>
</html>
