<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Login Estudiantil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="login-body">

    <div class="neon-box login-card">

        <div class="logo-wrapper login-logo">
            <img src="{{ url_for('static', filename='img/logo_sage.png') }}" alt="SAGE Logo" class="logo-img login-logo__img">
        </div>

        <p class="login-subtitle">Portal de Estudiantes</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="background-color: {% if category == 'success' %}#1a2f24{% else %}#2f1a1a{% endif %}; border: 1px solid {% if category == 'success' %}#3dba8a{% else %}#ff4c4c{% endif %}; color: {% if category == 'success' %}#3dba8a{% else %}#ff4c4c{% endif %}; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 0.9em; font-family: 'Orbitron', sans-serif;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <input type="text"     name="email"    class="neon-input" placeholder="Correo Institucional" required>
            <input type="password" name="password" class="neon-input" placeholder="Contraseña" required>
            <input type="hidden"   name="role"     value="estudiante">
            <button type="submit" class="btn-action-green login-btn">INICIAR SESIÓN</button>
        </form>

        <p class="login-footer">
            ¿No tienes cuenta? <a href="{{ url_for('registro') }}" class="login-footer__link">Regístrate aquí</a>
        </p>

    </div>

</body>
</html>
