<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Login Estudiantil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #0b101a; font-family: 'Segoe UI', sans-serif;">

    <div class="neon-box" style="width: 100%; max-width: 400px; padding: 40px 30px; box-sizing: border-box; text-align: center; background-color: rgba(17, 24, 39, 0.8); border: 1px solid #7ba2f8; border-radius: 15px; box-shadow: 0 0 15px rgba(123, 162, 248, 0.3);">
        
        <div class="logo-wrapper" style="width: 120px; height: 120px; background: rgba(11, 16, 26, 0.6); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; overflow: hidden; border: 1px solid rgba(123, 162, 248, 0.3);">
            <img src="{{ url_for('static', filename='img/logo_sage.png') }}" alt="SAGE Logo" style="max-width: 80%; height: auto;">
        </div>

        <p style="color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem;">Portal de Estudiantes</p>
        
        <form action="{{ url_for('dashboard') }}" method="GET">
            <input type="text" class="neon-input" placeholder="Matrícula" required 
                style="width: 100%; margin-bottom: 15px; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 5px; box-sizing: border-box;">
            
            <input type="password" class="neon-input" placeholder="Contraseña" required 
                style="width: 100%; margin-bottom: 25px; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 5px; box-sizing: border-box;">
            
            <button type="submit" class="btn-action-green" 
                style="width: 100%; padding: 12px; cursor: pointer; background: #10b981; color: white; border: none; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; transition: 0.3s;">
                INICIAR SESIÓN
            </button>
        </form>

        <p style="margin-top: 25px; font-size: 0.9rem; color: #94a3b8;">
            ¿No tienes cuenta? <a href="{{ url_for('registro') }}" style="color: #7ba2f8; text-decoration: none; font-weight: 600;">Regístrate aquí</a>
        </p>
    </div>

    <style>
        .neon-input:focus {
            outline: none;
            border-color: #7ba2f8 !important;
            box-shadow: 0 0 10px rgba(123, 162, 248, 0.5);
        }
        .btn-action-green:hover {
            background: #059669 !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            transform: scale(1.02);
        }
    </style>

</body>
</html>
