<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Portal Estudiantes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="background-color: #0b101a; color: white; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

    <div id="miSidebar" class="sidebar" style="position: fixed; left: -250px; width: 250px; height: 100%; background: #111827; transition: 0.3s; z-index: 1001; padding-top: 20px; border-right: 1px solid #7ba2f8;">
        <a href="{{ url_for('dashboard') }}" class="sidebar-item" style="display: block; padding: 15px 25px; color: white; text-decoration: none;">🏠 INICIO</a>
        <hr style="border: 1px solid rgba(123, 162, 248, 0.3); margin: 15px 20px;">
        
        <a href="{{ url_for('agendar') }}" class="sidebar-item" style="display: block; padding: 15px 25px; color: white; text-decoration: none;">📅 AGENDAR ESPACIO</a>
        <a href="{{ url_for('mis_reservas') }}" class="sidebar-item" style="display: block; padding: 15px 25px; color: white; text-decoration: none;">🕒 MIS RESERVAS</a>
        <a href="{{ url_for('eventos') }}" class="sidebar-item" style="display: block; padding: 15px 25px; color: white; text-decoration: none;">🎟️ EVENTOS</a>
        <a href="{{ url_for('sitios') }}" class="sidebar-item" style="display: block; padding: 15px 25px; color: white; text-decoration: none;">📍 SITIOS E INFO</a>
        
        <hr style="border: 1px solid rgba(123, 162, 248, 0.3); margin: 15px 20px;">
        <a href="#" class="sidebar-item" onclick="abrirPerfil()" style="display: block; padding: 15px 25px; color: #4ade80; text-decoration: none;">👤 MI PERFIL</a>
        
        <a href="{{ url_for('login') }}" class="sidebar-item" style="display: block; padding: 15px 25px; margin-top: 50px; color: #f87171; text-decoration: none;">🚪 CERRAR SESIÓN</a>
    </div>

    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(3, 6, 13, 0.9); border-bottom: 1px solid #7ba2f8; position: sticky; top: 0; z-index: 1000;">
        <div onclick="toggleSidebar()" style="cursor: pointer; display: flex; align-items: center; gap: 15px;">
            <span style="color: #7ba2f8; font-size: 1.5rem;">☰</span>
            <strong style="color: #4ade80; font-family: 'Orbitron'; font-size: 1.6rem; letter-spacing: 3px;">SAGE</strong>
        </div>
        
        <div style="display: flex; align-items: center; gap: 25px;">
            <span style="font-family: 'Orbitron'; font-size: 0.8rem; color: #7ba2f8;">PORTAL ALUMNO</span>
            <div style="width: 35px; height: 35px; border-radius: 50%; border: 2px solid #7ba2f8; display: flex; justify-content: center; align-items: center; cursor: pointer;" onclick="abrirPerfil()">
                <span>🎓</span>
            </div>
        </div>
    </nav>

    <main style="padding: 40px 20px; max-width: 1200px; margin: 0 auto;">
        {% block content %}{% endblock %}
    </main>

    <div id="modalPerfil" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 2000;">
        <div style="background: #111827; padding: 30px; border-radius: 15px; border: 1px solid #7ba2f8; width: 400px;">
            <h2 style="color: #7ba2f8; text-align: center; font-family: 'Orbitron';">Mi Perfil</h2>
            <div style="margin-top: 20px;">
                <label style="color: #94a3b8; font-size: 0.8rem;">Matrícula:</label>
                <input type="text" value="1220432" readonly style="width: 100%; padding: 10px; background: #1f2937; border: 1px solid #374151; color: #94a3b8; margin-bottom: 15px;">
                
                <label style="color: #94a3b8; font-size: 0.8rem;">Correo:</label>
                <input type="email" value="alumno@universidad.edu.mx" style="width: 100%; padding: 10px; background: #1f2937; border: 1px solid #374151; color: white; margin-bottom: 15px;">
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button type="button" onclick="cerrarPerfil()" style="background: transparent; border: 1px solid #f87171; color: #f87171; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Cerrar</button>
                <button type="button" onclick="cerrarPerfil()" style="background: #10b981; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('miSidebar');
            sb.style.left = sb.style.left === '0px' ? '-250px' : '0px';
        }
        function abrirPerfil() {
            document.getElementById('modalPerfil').style.display = 'flex';
        }
        function cerrarPerfil() {
            document.getElementById('modalPerfil').style.display = 'none';
        }
    </script>
</body>
</html>
